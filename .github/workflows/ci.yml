name: PromptX CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8
    
    - name: Check code style
      run: |
        flake8 backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,venv
    
    - name: Verify syntax
      run: |
        python -m compileall backend

    - name: Run Django tests
      env:
        SECRET_KEY: "django-insecure-ci-testing-dummy-key-value-to-pass-checks"
        DEBUG: "True"
        MOCK_AI: "true"
      run: |
        python backend/manage.py check
        python backend/manage.py test enhancer
