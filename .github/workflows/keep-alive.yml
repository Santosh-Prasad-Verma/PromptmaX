name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # every 14 minutes
  workflow_dispatch:  # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -sf https://promptmax-backend.onrender.com/api/v1/health/ || echo "Backend ping failed"
      - name: Ping Frontend (Canonical)
        run: |
          curl -sf https://promptx-hkfx.onrender.com/ || echo "Frontend (Canonical) ping failed"
      - name: Ping Frontend (Alternative)
        run: |
          curl -sf https://promptmax-backend.onrender.com/ || echo "Frontend (Alternative) ping failed"
