name: PromptX CD

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Verification & Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "django-insecure-ci-testing-dummy-key-value-to-pass-checks"
      DEBUG: "True"
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django Checks
      run: |
        python backend/manage.py check

    - name: Run Backend Unit Tests
      run: |
        python backend/manage.py test backend/enhancer/

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Trigger Render Deploy Hook
      env:
        DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -z "$DEPLOY_HOOK" ]; then
          echo "⚠️ RENDER_DEPLOY_HOOK_URL secret is not set. Skipping auto-trigger."
          echo "To enable auto-deployment, add RENDER_DEPLOY_HOOK_URL to your GitHub repository secrets."
        else
          echo "🚀 Triggering Render deployment..."
          curl -sS -X GET "$DEPLOY_HOOK" > /dev/null
          echo "✅ Deployment triggered successfully!"
        fi
