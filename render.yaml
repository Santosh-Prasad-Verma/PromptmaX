services:
  # 1. Django Web Service
  - type: web
    name: promptx-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput && python backend/manage.py migrate"
    startCommand: "gunicorn --chdir backend promptx_project.wsgi:application --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-120} --max-requests ${GUNICORN_MAX_REQUESTS:-1000} --max-requests-jitter ${GUNICORN_MAX_REQUESTS_JITTER:-100}"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "promptx-backend.onrender.com,promptx-hkfx.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://promptx-hkfx.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: promptx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: promptx-redis
          property: connectionString
      - key: MISTRAL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # 2. Celery Worker (for background prompt processing/A/B testing)
  - type: worker
    name: promptx-celery-worker
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A promptx_project worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: promptx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: promptx-redis
          property: connectionString
      - key: MISTRAL_API_KEY
        sync: false

databases:
  # 3. PostgreSQL Database
  - name: promptx-db
    plan: free

redis:
  # 4. Redis Cache (for celery broker)
  - name: promptx-redis
    plan: free
