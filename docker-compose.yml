services:
  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app:Z
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=promptx_project.settings
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    command: >
      sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  redis:
    image: redis:7-alpine
    restart: always
